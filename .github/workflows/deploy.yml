name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: calculadora/package-lock.json

      - name: Install calculator dependencies
        run: npm ci
        working-directory: calculadora

      - name: Build calculator
        run: npm run build
        working-directory: calculadora

      - name: Assemble site
        run: |
          mkdir -p _site/calculadora
          # Copy root static files
          cp index.html _site/
          cp liquidaciones.html _site/
          cp -r assets _site/assets
          # Copy calculator build
          cp -r calculadora/dist/* _site/calculadora/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
